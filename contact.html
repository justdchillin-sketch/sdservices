<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Contact Us | STEVEDEV Digital Services</title>
    <meta name="description" content="Get in touch with STEVEDEV Digital Services. Send us a message or reach us via WhatsApp, email or Telegram." />
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <header>
      <div class="nav">
        <div class="brand">
          <div class="logo" aria-hidden="true"></div>
          <div>STEVEDEV <span style="color:var(--muted);font-weight:700">Digital Services</span></div>
        </div>
        <nav class="links" aria-label="Primary">
          <a href="index.html">Home</a>
          <a href="about.html">About</a>
          <a href="services.html">Services</a>
          <a href="portfolio.html">Portfolio</a>
          <a href="contact.html">Contact</a>
        </nav>
        <div class="cta">
          <a class="btn" href="index.html#call-to-action">Start a Project</a>
        </div>
      </div>
    </header>

    <main class="wrap">
      <section>
        <h1>Contact Us</h1>
        <p class="sub">We’d love to hear about your project.</p>
      </section>

      <section>
        <div class="panel">
          <h2 class="section-title">Send a Message</h2>

          <form class="contact-form" id="contactForm">
            <input type="text" name="name" placeholder="Your name" required />
            <input type="email" name="email" placeholder="Your email" required />
            <textarea name="message" rows="5" placeholder="Tell us about your project" required></textarea>
            <button type="submit" class="btn primary">Send Message</button>
          </form>
        </div>
      </section>

      <section style="margin-top:40px;">
        <h2 class="section-title">Other Ways to Reach Us</h2>

        <div class="cta" style="margin-top:20px; flex-wrap:wrap; gap:10px;">
          <a class="btn primary" href="javascript:void(0)" onclick="openLink('whatsapp')">WhatsApp</a>
          <a class="btn primary" href="javascript:void(0)" onclick="openLink('email')">Email</a>
          <a class="btn primary" href="javascript:void(0)" onclick="openLink('telegram')">Telegram</a>
          <a class="btn primary" href="javascript:void(0)" onclick="openLink('facebook')">Facebook</a>
          <a class="btn primary" href="javascript:void(0)" onclick="openLink('instagram')">Instagram</a>
        </div>
      </section>
    </main>

    <footer>
      <div>© <span id="year"></span> STEVEDEV Digital Services.</div>
    </footer>

    <script>
      document.getElementById('year').textContent = new Date().getFullYear();

      const form = document.getElementById("contactForm");

      form.addEventListener("submit", async (e) => {
        e.preventDefault();

        const formData = new FormData(form);
        const payload = Object.fromEntries(formData.entries());

        try {
          const response = await fetch("/api/notify", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify(payload)
          });

          if (!response.ok) {
            throw new Error("Failed to send message");
          }

          window.location.href = "/thanks.html";

        } catch (err) {
          console.error(err);
          alert("Something went wrong. Please try again.");
        }
      });
    </script>

    <script src="script.js"></script>
  </body>
</html>
